name: ml-training
channels:
  - conda-forge      # ARM64-native builds for Apple Silicon (M-series)
  - defaults

dependencies:
  - python=3.11

  # Core scientific stack — conda-forge ships Apple Accelerate-linked BLAS/LAPACK
  - numpy>=1.26
  - scipy>=1.12
  - pandas>=2.2
  - matplotlib>=3.8
  - seaborn>=0.13

  # ML
  - scikit-learn>=1.4

  # Notebooks
  - jupyterlab>=4.1
  - ipykernel>=6.29
  - ipywidgets>=8.1
  - nbformat>=5.9

  # Data I/O & utilities
  - kaggle                   # kaggle CLI for dataset downloads
  - openpyxl                 # Excel read/write (optional datasets)
  - tqdm                     # progress bars

  # Code quality
  - black
  - isort
  - flake8

  # Pinned pip-only extras (nothing available on conda-forge)
  - pip
  - pip:
    - jupytext               # convert notebooks ↔ Python scripts
